name: Docker CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'image/**'
      - '*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'image/**'
      - 'docs/**'
      - '*.md'

permissions:
  id-token: write
  contents: read

jobs:
  # 1. PR / main 공통: 빌드 및 테스트
  ci:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: local
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-2
      S3_BUCKET_NAME: test-bucket

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew clean build

  # 2. main push일 때만 Docker 이미지 빌드 및 Docker Hub Push
  build-and-push:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: local
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-northeast-2
      S3_BUCKET_NAME: test-bucket

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest

  # 3. main push일 때만 SSM Run Command로 EC2 자동 배포
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Deploy to EC2 by SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ap-northeast-2 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Boot Docker container" \
            --parameters 'commands=[
              "export AWS_DEFAULT_REGION=ap-northeast-2",
              "export DB_URL=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/DB_URL --query Parameter.Value --output text)",
              "export DB_USERNAME=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/DB_USERNAME --query Parameter.Value --output text)",
              "export DB_PASSWORD=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/DB_PASSWORD --with-decryption --query Parameter.Value --output text)",
              "export TEAM_NAME=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/TEAM_NAME --query Parameter.Value --output text)",
              "export S3_BUCKET_NAME=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/S3_BUCKET_NAME --query Parameter.Value --output text)",
              "export AWS_REGION=$(aws ssm get-parameter --region ap-northeast-2 --name /cloudproject/prod/AWS_REGION --query Parameter.Value --output text)",
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest",
              "sudo docker stop cloudproject || true",
              "sudo docker rm cloudproject || true",
              "sudo docker run -d --name cloudproject -p 8080:8080 --restart unless-stopped -e SPRING_PROFILES_ACTIVE=prod -e DB_URL=$DB_URL -e DB_USERNAME=$DB_USERNAME -e DB_PASSWORD=$DB_PASSWORD -e TEAM_NAME=$TEAM_NAME -e S3_BUCKET_NAME=$S3_BUCKET_NAME -e AWS_REGION=$AWS_REGION ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest",
              "sudo docker ps"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID"

          aws ssm wait command-executed \
            --region ap-northeast-2 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          echo "===== SSM Standard Output ====="
          aws ssm get-command-invocation \
            --region ap-northeast-2 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

          echo "===== SSM Standard Error ====="
          aws ssm get-command-invocation \
            --region ap-northeast-2 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text