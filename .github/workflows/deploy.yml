name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 1. PR / main 공통: 빌드 및 테스트
  ci:
    runs-on: ubuntu-latest

    steps:
      # GitHub Repository 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # GitHub Actions 실행 환경에 Java 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      # Linux 환경에서 gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Spring Boot 애플리케이션 빌드 및 테스트
      - name: Build and test
        run: ./gradlew clean build
        env:
          S3_BUCKET_NAME: test-bucket
          AWS_REGION: ap-northeast-2

  # 2. main push일 때만 Docker Hub Push
  build-and-push:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # GitHub Repository 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ARM64 이미지 빌드를 위한 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker 이미지 빌드 후 Docker Hub에 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest

  # 3. main push일 때만 EC2 자동 배포
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # SSH로 EC2에 접속하여 배포 명령어 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # AWS CLI 기본 리전 설정
            export AWS_DEFAULT_REGION=ap-northeast-2

            # Parameter Store에서 운영환경 설정값 조회
            export DB_URL=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/DB_URL" --query "Parameter.Value" --output text)
            export DB_USERNAME=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/DB_USERNAME" --query "Parameter.Value" --output text)
            export DB_PASSWORD=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/DB_PASSWORD" --with-decryption --query "Parameter.Value" --output text)
            export TEAM_NAME=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/TEAM_NAME" --query "Parameter.Value" --output text)
            export S3_BUCKET_NAME=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/S3_BUCKET_NAME" --query "Parameter.Value" --output text)
            export AWS_REGION=$(aws ssm get-parameter --region ap-northeast-2 --name "/cloudproject/prod/AWS_REGION" --query "Parameter.Value" --output text)

            # Docker Hub에서 최신 이미지 Pull
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest

            # 기존 컨테이너가 있으면 중지 및 삭제
            sudo docker stop cloudproject || true
            sudo docker rm cloudproject || true

            # 최신 이미지로 컨테이너 실행
            sudo docker run -d \
              --name cloudproject \
              -p 8080:8080 \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="$DB_URL" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e TEAM_NAME="$TEAM_NAME" \
              -e S3_BUCKET_NAME="$S3_BUCKET_NAME" \
              -e AWS_REGION="$AWS_REGION" \
              ${{ secrets.DOCKER_USERNAME }}/cloudproject:latest

            # 실행 중인 컨테이너 확인
            sudo docker ps